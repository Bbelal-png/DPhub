<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Projection — Doc Hub</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Inter+Tight:wght@400;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');
:root{
  --bg:#06080d;--sf:#0e1219;--s2:#141b26;--s3:#1c2536;
  --bd:#22304a;--bd2:#2e4060;
  --ac:#e8401a;--ac2:#ff6040;
  --bl:#5590ff;--tx:#ced8eb;--dm:#7a90ad;--br:#f0f4fc;
  --gn:#35d494;--yl:#f7c040;--pu:#a98af0;--te:#45d8cc;--or:#ff9f45;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--tx);font-family:'Inter',sans-serif;font-weight:400;min-height:100vh;font-size:14px}
header{background:linear-gradient(180deg,#080c14,var(--sf));border-bottom:1px solid var(--bd);padding:0 2rem;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
.logo{height:28px;object-fit:contain}
.hright{display:flex;align-items:center;gap:1rem}
.hbadge{font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--dm);letter-spacing:.12em;text-transform:uppercase}
.btn-mgr{display:flex;align-items:center;gap:.4rem;padding:.46rem .95rem;background:rgba(232,64,26,.12);border:1px solid rgba(232,64,26,.4);border-radius:6px;color:var(--ac2);font-family:'Inter Tight',sans-serif;font-size:.78rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;transition:all .15s}
.btn-mgr:hover{background:rgba(232,64,26,.24);border-color:var(--ac)}
.sz{background:linear-gradient(180deg,rgba(14,18,25,.98),transparent);padding:1rem 2rem .88rem;position:sticky;top:64px;z-index:100;border-bottom:1px solid rgba(34,48,74,.5)}
.si{max-width:1020px;margin:0 auto;display:flex;gap:.7rem;align-items:center;flex-wrap:wrap}
.sw{flex:1;min-width:200px;display:flex;align-items:center;gap:.55rem;background:var(--s2);border:1px solid var(--bd);border-radius:7px;padding:0 .9rem;transition:border-color .2s}
.sw:focus-within{border-color:rgba(232,64,26,.55)}
.sw svg{color:var(--dm);flex-shrink:0}
.sw input{flex:1;background:none;border:none;outline:none;color:var(--br);font-family:'Inter',sans-serif;font-size:.88rem;padding:.7rem 0}
.sw input::placeholder{color:var(--dm)}
.chips{display:flex;gap:.35rem;flex-wrap:wrap}
.chip{padding:.36rem .78rem;background:var(--s2);border:1px solid var(--bd);border-radius:20px;color:var(--tx);font-family:'Inter Tight',sans-serif;font-size:.72rem;font-weight:500;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;transition:all .15s;white-space:nowrap}
.chip:hover{border-color:var(--bd2);color:var(--br)}
.chip.on{border-color:var(--ac);color:var(--ac2);background:rgba(232,64,26,.1)}
.lay{display:flex;max-width:1380px;margin:0 auto;padding:1.1rem 2rem 3rem;gap:1.6rem}
aside{width:222px;flex-shrink:0}
.sl{font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;color:var(--dm);padding:0 .6rem;margin-bottom:.38rem}
.ss{margin-bottom:1.4rem}
.sbb{display:flex;align-items:center;gap:.5rem;width:100%;padding:.52rem .68rem;background:none;border:none;border-radius:6px;color:var(--tx);font-family:'Inter',sans-serif;font-size:.84rem;cursor:pointer;text-align:left;transition:all .12s;position:relative}
.sbb:hover{background:var(--s2);color:var(--br)}
.sbb.on{background:rgba(232,64,26,.12);color:var(--ac2)}
.sbb.on::before{content:'';position:absolute;left:0;top:22%;height:56%;width:2px;background:var(--ac);border-radius:0 2px 2px 0}
.dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sc{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--tx);background:var(--s3);padding:.1rem .4rem;border-radius:3px}
.stb{display:flex;align-items:center;gap:.48rem;width:100%;padding:.4rem .68rem;background:none;border:none;border-radius:5px;color:var(--tx);font-family:'Inter',sans-serif;font-size:.8rem;cursor:pointer;text-align:left;transition:all .12s}
.stb:hover{color:var(--br);background:var(--s2)}
.stb.on{color:var(--yl);font-weight:500}
.sti{font-size:.8rem;width:15px;text-align:center;flex-shrink:0}
main{flex:1;min-width:0}
.rb{padding:.3rem 0 .72rem}
.rt{font-family:'Inter',sans-serif;font-size:.83rem;color:var(--tx)}
.rt strong{color:var(--br);font-weight:600}
.card{background:var(--sf);border:1px solid var(--bd);border-radius:9px;margin-bottom:5px;overflow:hidden;transition:border-color .2s}
.card:hover{border-color:var(--bd2)}
.ch{display:flex;align-items:center;gap:.85rem;padding:.88rem 1.1rem;cursor:pointer;user-select:none}
.cb{font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:.07em;padding:.18rem .48rem;border-radius:4px;text-transform:uppercase;flex-shrink:0;font-weight:500}
.ctype{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--tx);background:var(--s3);padding:.15rem .45rem;border-radius:4px;flex-shrink:0}
.cn{flex:1;font-family:'Inter Tight',sans-serif;font-size:1rem;font-weight:700;letter-spacing:.02em;color:var(--br)}
.cpn{font-family:'JetBrains Mono',monospace;font-size:.65rem;color:var(--tx);background:var(--s3);padding:.15rem .45rem;border-radius:4px}
.cv{color:var(--tx);font-size:.68rem;transition:transform .2s;flex-shrink:0}
.card.op .cv{transform:rotate(90deg)}
.dg{display:none;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:5px;padding:5px 1.1rem 1.1rem;border-top:1px solid var(--bd)}
.card.op .dg{display:grid}
a.dt{display:flex;flex-direction:column;gap:.26rem;padding:.65rem .8rem;background:var(--s2);border:1px solid var(--bd);border-radius:6px;cursor:pointer;transition:all .14s;position:relative;overflow:hidden;text-decoration:none;color:inherit}
a.dt::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;opacity:0;transition:opacity .14s}
a.dt:hover{border-color:var(--bd2);background:var(--s3);transform:translateY(-1px)}
a.dt:hover::before{opacity:1}
a.dt:hover .dlb{color:var(--ac2)}
a.dt.empty{opacity:.45;cursor:default;pointer-events:none}
.dic{font-size:.93rem;line-height:1}
.dlb{font-family:'Inter Tight',sans-serif;font-size:.73rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--br);transition:color .12s}
.dpt{font-family:'JetBrains Mono',monospace;font-size:.56rem;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:.08rem}
.dhi{font-family:'Inter',sans-serif;font-size:.62rem;color:var(--ac2);opacity:0;transition:opacity .12s;margin-top:.15rem;font-weight:500}
a.dt:hover .dhi{opacity:1}
a.dt[data-t="firmware"]::before{background:var(--gn)}
a.dt[data-t="service_manual"]::before{background:var(--ac)}
a.dt[data-t="user_manual"]::before{background:var(--bl)}
a.dt[data-t="comm_protocol"]::before{background:var(--pu)}
a.dt[data-t="drawings"]::before{background:var(--yl)}
a.dt[data-t="parts_list"]::before{background:var(--bd2)}
a.dt[data-t="tech_bulletins"]::before{background:var(--or)}
a.dt[data-t="lenses"]::before{background:var(--te)}
.b-ev{background:rgba(85,144,255,.15);color:#7aaeff}
.b-mv{background:rgba(53,212,148,.15);color:#50e0a0}
.b-tl{background:rgba(232,64,26,.15);color:var(--ac2)}
.b-sat{background:rgba(247,192,64,.15);color:#ffd068}
.b-cu{background:rgba(69,216,204,.15);color:#60eae0}
.d-ev{background:#5590ff}.d-mv{background:var(--gn)}.d-tl{background:var(--ac2)}
.d-sat{background:var(--yl)}.d-cu{background:var(--te)}
.empty{text-align:center;padding:4rem 2rem;color:var(--tx)}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;z-index:9999;background:var(--s3);border:1px solid var(--gn);color:var(--gn);padding:.55rem 1.1rem;border-radius:6px;font-family:'JetBrains Mono',monospace;font-size:.72rem;opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none}
.toast.on{opacity:1;transform:translateY(0)}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:5000;display:flex;align-items:center;justify-content:center}
.ov[hidden]{display:none}
.pn{background:var(--sf);border:1px solid var(--bd2);border-radius:11px;width:min(720px,95vw);max-height:90vh;overflow-y:auto}
.ph{display:flex;align-items:center;justify-content:space-between;padding:1.2rem 1.5rem 1rem;border-bottom:1px solid var(--bd);position:sticky;top:0;background:var(--sf);z-index:1}
.pt{font-family:'Inter Tight',sans-serif;font-weight:800;font-size:1rem;letter-spacing:.04em;text-transform:uppercase;color:var(--br)}
.pc{background:none;border:1px solid var(--bd);border-radius:5px;color:var(--tx);cursor:pointer;padding:.28rem .52rem;font-size:.88rem;transition:all .15s}
.pc:hover{border-color:var(--ac);color:var(--ac)}
.pb{padding:1.2rem 1.5rem}
.tabs{display:flex;gap:.28rem;margin-bottom:1.15rem}
.tab{padding:.42rem .95rem;background:none;border:1px solid var(--bd);border-radius:6px;color:var(--tx);font-family:'Inter Tight',sans-serif;font-size:.76rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;transition:all .15s}
.tab:hover{color:var(--br);border-color:var(--bd2)}
.tab.on{border-color:var(--ac);color:var(--ac2);background:rgba(232,64,26,.1)}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin-bottom:.7rem}
.g{display:flex;flex-direction:column;gap:.32rem}
.g label{font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--tx)}
.g input,.g select{background:var(--s2);border:1px solid var(--bd);border-radius:6px;color:var(--br);font-family:'Inter',sans-serif;font-size:.85rem;padding:.58rem .78rem;outline:none;transition:border-color .15s;width:100%}
.g input:focus,.g select:focus{border-color:rgba(232,64,26,.55)}
option{background:var(--s2)}
.fsec{background:var(--s2);border:1px solid var(--bd);border-radius:7px;padding:.88rem;margin-bottom:.7rem}
.fst{font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--tx);margin-bottom:.6rem;display:flex;align-items:center;gap:.42rem}
.fst span{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.fac{display:flex;gap:.6rem;justify-content:flex-end;margin-top:.9rem;padding-top:.9rem;border-top:1px solid var(--bd)}
.bp{padding:.58rem 1.4rem;background:var(--ac);border:none;border-radius:6px;color:#fff;font-family:'Inter Tight',sans-serif;font-size:.82rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;transition:background .15s}
.bp:hover{background:var(--ac2)}
.bs{padding:.58rem 1.15rem;background:none;border:1px solid var(--bd2);border-radius:6px;color:var(--tx);font-family:'Inter Tight',sans-serif;font-size:.82rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;transition:all .15s}
.bs:hover{border-color:var(--tx);color:var(--br)}
.bdd{padding:.4rem .85rem;background:none;border:1px solid rgba(232,64,26,.35);border-radius:5px;color:var(--ac2);font-family:'JetBrains Mono',monospace;font-size:.67rem;cursor:pointer;transition:all .15s}
.bdd:hover{background:rgba(232,64,26,.12)}
.pl{display:flex;flex-direction:column;gap:4px}
.pi{display:flex;align-items:center;gap:.7rem;padding:.65rem .9rem;background:var(--s2);border:1px solid var(--bd);border-radius:6px}
.pin{flex:1;font-family:'Inter Tight',sans-serif;font-size:.88rem;font-weight:700;color:var(--br)}
.pii{font-family:'JetBrains Mono',monospace;font-size:.62rem;color:var(--tx);background:var(--s3);padding:.12rem .4rem;border-radius:3px}
.pia{display:flex;gap:.32rem;flex-shrink:0}
.be{padding:.28rem .6rem;background:none;border:1px solid var(--bd2);border-radius:4px;color:var(--tx);font-family:'JetBrains Mono',monospace;font-size:.64rem;cursor:pointer;transition:all .15s}
.be:hover{border-color:var(--bl);color:var(--bl)}
.iosec{margin-bottom:1rem}
.iot{font-family:'Inter Tight',sans-serif;font-size:.84rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--br);margin-bottom:.45rem}
.iod{font-size:.81rem;color:var(--tx);margin-bottom:.7rem;line-height:1.6}
.bio{padding:.56rem 1.1rem;background:var(--s2);border:1px solid var(--bd2);border-radius:6px;color:var(--br);font-family:'Inter Tight',sans-serif;font-size:.78rem;font-weight:600;letter-spacing:.05em;text-transform:uppercase;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:.45rem}
.bio:hover{border-color:var(--ac);color:var(--ac2)}
.fiw{position:relative;display:inline-block}
.fiw input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}
@media(max-width:720px){aside{display:none}.lay{padding:.5rem 1rem 2rem}.fg{grid-template-columns:1fr}}
</style>
</head>

  'Satellite':             {b:'b-sat',d:'d-sat',s:'Satellite'},
  'Personnalise':          {b:'b-cu', d:'d-cu', s:'Custom'},
};

let overrides={}, custom=[], fSer='all', fType='all', editMode=null;

function sm(s){ return SM[s]||{b:'b-cu',d:'d-cu',s:s.substring(0,8)}; }
function load(){
  try{ overrides=JSON.parse(localStorage.getItem('dp_ov')||'{}'); }catch(e){ overrides={}; }
  try{ custom=JSON.parse(localStorage.getItem('dp_lc')||'[]'); }catch(e){ custom=[]; }
}
function saveOv(){ localStorage.setItem('dp_ov',JSON.stringify(overrides)); }
function saveC(){  localStorage.setItem('dp_lc',JSON.stringify(custom)); }

function resolvedBase(i){
  const p=Object.assign({},BASE[i],{docs:Object.assign({},BASE[i].docs)});
  const ov=overrides[i];
  if(ov){
    if(ov.docs) Object.assign(p.docs,ov.docs);
    if(ov.part_number!==undefined) p.part_number=ov.part_number;
  }
  return p;
}
function allProducts(){ return BASE.map((_,i)=>resolvedBase(i)).concat(custom); }
function vp(p){ return p&&p.trim().length>3; }
function serL(){ const s=new Set(),o=[]; allProducts().forEach(p=>{ if(!s.has(p.series)){s.add(p.series);o.push(p.series);} }); return o; }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function toURI(path){
  if(!path) return null;
  const p=path.trim();
  if(p.startsWith('http')||p.startsWith('file:')) return p;
  return 'file:///'+p.replace(/\\/g,'/');
}
function toast(msg,col){
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.borderColor=col||'var(--gn)'; t.style.color=col||'var(--gn)';
  t.classList.add('on'); clearTimeout(t._t); t._t=setTimeout(()=>t.classList.remove('on'),2500);
}

/* RENDER */
function render(){
  buildSide();
  const q=document.getElementById('qi').value.toLowerCase().trim();
  const prods=allProducts().filter(p=>{
    if(fSer!=='all'&&p.series!==fSer) return false;
    if(q&&!p.name.toLowerCase().includes(q)&&!(p.part_number||'').toLowerCase().includes(q)) return false;
    return true;
  });
  document.getElementById('rc').textContent=prods.length;
  const grid=document.getElementById('grid');
  const empt=document.getElementById('empt');
  if(!prods.length){ grid.innerHTML=''; empt.style.display='block'; return; }
  empt.style.display='none';
  grid.innerHTML='';
  prods.forEach(p=>{
    const m=sm(p.series);
    const card=document.createElement('div'); card.className='card';
    const hd=document.createElement('div'); hd.className='ch';
    hd.innerHTML='<span class="cb '+m.b+'">'+m.s+'</span>'
      +(p.type?'<span class="ctype">'+esc(p.type)+'</span>':'')
      +'<span class="cn">'+esc(p.name)+'</span>'
      +(p.part_number?'<span class="cpn">'+esc(p.part_number)+'</span>':'')
      +'<span class="cv">&#9658;</span>';
    hd.addEventListener('click',()=>card.classList.toggle('op'));
    const dg=document.createElement('div'); dg.className='dg';
    let shown=0;
    Object.entries(DM).forEach(([k,dm])=>{
      if(fType!=='all'&&fType!==k) return;
      const raw=(p.docs||{})[k]||'';
      const has=vp(raw);
      const uri=has?toURI(raw):null;
      const fn=raw?raw.replace(/\\/g,'/').split('/').filter(Boolean).pop():'';
      const sp=fn||raw.substring(0,35)||'';
      const a=document.createElement('a');
      a.className='dt'+(has?'':' empty'); a.dataset.t=k;
      if(uri){ a.href=uri; } else { a.href='#'; a.addEventListener('click',e=>e.preventDefault()); }
      a.innerHTML='<span class="dic">'+dm.i+'</span>'
        +'<span class="dlb">'+dm.l+'</span>'
        +'<span class="dpt">'+(has?esc(sp):'<em style="font-style:normal;color:var(--dm)">-- non renseign\u00e9</em>')+'</span>'
        +(has?'<span class="dhi">&#8599; Ouvrir</span>':'');
      dg.appendChild(a); shown++;
    });
    if(fType!=='all'&&shown===0) return;
    card.appendChild(hd); card.appendChild(dg); grid.appendChild(card);
  });
}

function buildSide(){
  const prods=allProducts(); const series=serL();
  const sbS=document.getElementById('sbS'); sbS.innerHTML='';
  function mkSB(lbl,val,dotCls,cnt){
    const b=document.createElement('button'); b.className='sbb'+(fSer===val?' on':'');
    const dot=document.createElement('span'); dot.className='dot';
    if(dotCls) dot.classList.add(dotCls); else dot.style.background='var(--dm)';
    b.appendChild(dot); b.appendChild(document.createTextNode(' '+lbl));
    const ct=document.createElement('span'); ct.className='sc'; ct.textContent=cnt;
    b.appendChild(ct); b.addEventListener('click',()=>{ fSer=val; render(); }); sbS.appendChild(b);
  }
  mkSB('Toutes','all','',prods.length);
  series.forEach(s=>mkSB(sm(s).s,s,sm(s).d,prods.filter(p=>p.series===s).length));
  sbS.querySelectorAll('.dot').forEach((el,i)=>{ if(i===0) return; el.removeAttribute('style'); el.classList.add(sm(series[i-1]).d); });

  const sbT=document.getElementById('sbT'); sbT.innerHTML='';
  function mkDT(lbl,val,ico){
    const b=document.createElement('button'); b.className='stb'+(fType===val?' on':'');
    b.innerHTML='<span class="sti">'+ico+'</span>'+lbl;
    b.addEventListener('click',()=>{ fType=val; render(); }); sbT.appendChild(b);
  }
  mkDT('Tous types','all','&#9672;');
  Object.entries(DM).forEach(([k,v])=>mkDT(v.l,k,v.i));

  const ch=document.getElementById('chips'); ch.innerHTML='';
  function mkCh(lbl,val){
    const c=document.createElement('button'); c.className='chip'+(fSer===val?' on':'');
    c.textContent=lbl; c.addEventListener('click',()=>{ fSer=val; render(); }); ch.appendChild(c);
  }
  mkCh('Tous','all');
  series.forEach(s=>mkCh(sm(s).s,s));
}

/* MODAL */
function openMgr(){ document.getElementById('modal').removeAttribute('hidden'); showTab('list'); }
function closeMgr(){ document.getElementById('modal').setAttribute('hidden',''); editMode=null; }

document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('btnMgr').addEventListener('click',openMgr);
  document.getElementById('btnClose').addEventListener('click',closeMgr);
  document.getElementById('modal').addEventListener('click',function(e){ if(e.target===this) closeMgr(); });
  document.getElementById('qi').addEventListener('input',render);
  document.querySelectorAll('.tab').forEach(b=>{
    b.addEventListener('click',()=>{ document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on')); b.classList.add('on'); showTab(b.dataset.tab); });
  });
  load(); render();
});

function showTab(tab){
  ['list','add','io'].forEach(t=>{ document.getElementById('t_'+t).style.display=t===tab?'':'none'; });
  if(tab==='list') renderList();
  if(tab==='add')  renderAdd();
  if(tab==='io')   renderIO();
}

/* LIST */
function renderList(){
  const el=document.getElementById('t_list'); el.innerHTML='';
  const pl=document.createElement('div'); pl.className='pl';
  BASE.forEach((bp,i)=>{
    const p=resolvedBase(i); const m=sm(p.series);
    const dc=Object.values(p.docs||{}).filter(vp).length;
    const hasOv=!!overrides[i];
    const item=document.createElement('div'); item.className='pi';
    item.innerHTML='<span class="cb '+m.b+'" style="flex-shrink:0">'+m.s+'</span>'
      +'<span class="pin">'+esc(p.name)+'</span>'
      +(p.part_number?'<span class="pii">'+esc(p.part_number)+'</span>':'')
      +(hasOv?'<span class="pii" style="color:var(--yl)">modifi\u00e9</span>':'')
      +'<span class="pii">'+dc+' fichier'+(dc>1?'s':'')+'</span>'
      +'<span class="pia"></span>';
    const acts=item.querySelector('.pia');
    const be=document.createElement('button'); be.className='be'; be.textContent='Éditer';
    be.addEventListener('click',()=>{ editMode={type:'base',idx:i}; document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on')); document.querySelector('[data-tab="add"]').classList.add('on'); showTab('add'); });
    acts.appendChild(be);
    if(hasOv){
      const br=document.createElement('button'); br.className='bdd'; br.textContent='Reset';
      br.addEventListener('click',()=>{ if(!confirm('Remettre les chemins d\'origine ?')) return; delete overrides[i]; saveOv(); render(); renderList(); toast('R\u00e9initialis\u00e9'); });
      acts.appendChild(br);
    }
    pl.appendChild(item);
  });
  custom.forEach((p,i)=>{
    const m=sm(p.series);
    const dc=Object.values(p.docs||{}).filter(vp).length;
    const item=document.createElement('div'); item.className='pi';
    item.innerHTML='<span class="cb '+m.b+'" style="flex-shrink:0">'+m.s+'</span>'
      +'<span class="pin">'+esc(p.name)+'</span>'
      +(p.part_number?'<span class="pii">'+esc(p.part_number)+'</span>':'')
      +'<span class="pii" style="color:var(--te)">personnalis\u00e9</span>'
      +'<span class="pii">'+dc+' fichier'+(dc>1?'s':'')+'</span>'
      +'<span class="pia"></span>';
    const acts=item.querySelector('.pia');
    const be=document.createElement('button'); be.className='be'; be.textContent='Éditer';
    be.addEventListener('click',()=>{ editMode={type:'custom',idx:i}; document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on')); document.querySelector('[data-tab="add"]').classList.add('on'); showTab('add'); });
    const bd=document.createElement('button'); bd.className='bdd'; bd.textContent='✕';
    bd.addEventListener('click',()=>{ if(!confirm('Supprimer ?')) return; custom.splice(i,1); saveC(); render(); renderList(); toast('Supprim\u00e9'); });
    acts.appendChild(be); acts.appendChild(bd);
    pl.appendChild(item);
  });
  el.appendChild(pl);
}

/* ADD/EDIT */
function renderAdd(){
  const el=document.getElementById('t_add'); el.innerHTML='';
  let p=null, isBase=false;
  if(editMode){ if(editMode.type==='base'){ p=resolvedBase(editMode.idx); isBase=true; } else { p=custom[editMode.idx]; } }
  const h=document.createElement('h3');
  h.style.cssText='font-family:Inter Tight,sans-serif;font-size:.84rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--br);margin-bottom:.9rem';
  h.textContent=!editMode?'Nouveau produit':(isBase?'Modifier les chemins \u2014 '+p.name:'Modifier \u2014 '+p.name);
  el.appendChild(h);

  if(isBase){
    const info=document.createElement('div');
    info.style.cssText='background:rgba(247,192,64,.07);border:1px solid rgba(247,192,64,.2);border-radius:5px;padding:.6rem .88rem;font-size:.78rem;color:#ffd068;margin-bottom:.9rem;line-height:1.5';
    info.innerHTML='&#9998; Vous modifiez les <strong>chemins d\'acc\u00e8s</strong> de ce produit. Cliquez "Reset" dans la liste pour revenir aux valeurs d\'origine.';
    el.appendChild(info);
    const g1=document.createElement('div'); g1.className='fg';
    g1.innerHTML='<div class="g"><label>Num\u00e9ro de pi\u00e8ce</label><input id="fpn" value="'+esc(p.part_number||'')+'"></div>';
    el.appendChild(g1);
  } else {
    const tip=document.createElement('div');
    tip.style.cssText='background:rgba(85,144,255,.07);border:1px solid rgba(85,144,255,.18);border-radius:5px;padding:.6rem .88rem;font-size:.77rem;color:#7aaeff;margin-bottom:.85rem;line-height:1.5';
    tip.innerHTML='<strong>Astuce :</strong> Shift + clic droit sur un fichier &rarr; <em>"Copier en tant que chemin"</em>';
    el.appendChild(tip);
    const g1=document.createElement('div'); g1.className='fg';
    g1.innerHTML='<div class="g"><label>Nom du mod\u00e8le *</label><input id="fn" value="'+esc(p?p.name:'')+'" placeholder="Nouveau mod\u00e8le"></div>'
      +'<div class="g"><label>Gamme *</label><select id="fs">'
      +['E-Vision Projectors','M-Vision Projectors','Titan Laser Projectors','Satellite','Personnalise'].map(s=>'<option value="'+s+'"'+(p&&p.series===s?' selected':'')+'>'+s+'</option>').join('')
      +'</select></div>'
      +'<div class="g"><label>Type</label><input id="ftype" value="'+esc(p?p.type||'':'')+'" placeholder="Pro, L1, K1\u2026"></div>'
      +'<div class="g"><label>Num\u00e9ro de pi\u00e8ce</label><input id="fpn" value="'+esc(p?p.part_number||'':'')+'" placeholder="120-XXX"></div>';
    el.appendChild(g1);
  }

  const sec=document.createElement('div'); sec.className='fsec';
  sec.innerHTML='<div class="fst"><span style="background:var(--gn)"></span>Chemins vers les fichiers</div>';
  const g2=document.createElement('div'); g2.className='fg';
  Object.entries(DM).forEach(([k,dm])=>{
    const val=p?(p.docs[k]||''):'';
    const dg=document.createElement('div'); dg.className='g';
    dg.innerHTML='<label>'+dm.i+' '+dm.l+'</label><input id="fd_'+k+'" value="'+esc(val)+'" placeholder="C:\\Users\\...\\fichier.pdf">';
    g2.appendChild(dg);
  });
  sec.appendChild(g2); el.appendChild(sec);

  const fa=document.createElement('div'); fa.className='fac';
  const bc=document.createElement('button'); bc.className='bs'; bc.textContent='Annuler';
  bc.addEventListener('click',()=>{ editMode=null; document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on')); document.querySelector('[data-tab="list"]').classList.add('on'); showTab('list'); });
  const bs=document.createElement('button'); bs.className='bp'; bs.textContent=editMode?'Enregistrer':'Ajouter';
  bs.addEventListener('click',saveProd);
  fa.appendChild(bc); fa.appendChild(bs); el.appendChild(fa);
}

function saveProd(){
  const docs={};
  Object.keys(DM).forEach(k=>{ const v=document.getElementById('fd_'+k).value.trim(); if(v) docs[k]=v; });
  if(editMode&&editMode.type==='base'){
    const pn=document.getElementById('fpn').value.trim();
    overrides[editMode.idx]={docs,part_number:pn};
    saveOv(); toast('Chemins mis \u00e0 jour');
  } else {
    const nameEl=document.getElementById('fn'); if(!nameEl||!nameEl.value.trim()){ toast('Nom requis','var(--ac)'); return; }
    const prod={name:nameEl.value.trim(),series:document.getElementById('fs').value,type:(document.getElementById('ftype')||{}).value||'',part_number:document.getElementById('fpn').value.trim(),docs};
    if(editMode&&editMode.type==='custom'){ custom[editMode.idx]=prod; toast('Mis \u00e0 jour'); }
    else{ custom.push(prod); toast('Produit ajout\u00e9'); }
    saveC();
  }
  editMode=null; render();
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
  document.querySelector('[data-tab="list"]').classList.add('on');
  showTab('list');
}

/* IO */
function renderIO(){
  const el=document.getElementById('t_io'); el.innerHTML='';
  const cu=custom.length, ov=Object.keys(overrides).length;
  el.innerHTML='<div class="iosec"><div class="iot">Sauvegarde</div>'
    +'<div class="iod">Exportez vos donn\u00e9es (produits ajout\u00e9s + chemins modifi\u00e9s) pour les sauvegarder ou les transf\u00e9rer.</div>'
    +'<div style="display:flex;gap:.5rem;flex-wrap:wrap">'
    +'<button class="bio" id="bExp">Exporter ('+cu+' produit'+(cu>1?'s':'')+', '+ov+' modif.)</button>'
    +'<div class="fiw"><button class="bio">Importer un JSON</button><input type="file" accept=".json" id="fImp"></div>'
    +'</div></div>'
    +'<div class="iosec" style="border-top:1px solid var(--bd);padding-top:1rem"><div class="iot" style="color:var(--ac)">R\u00e9initialiser</div>'
    +'<div class="iod">Remet tous les chemins d\'origine et supprime les produits ajout\u00e9s.</div>'
    +'<button class="bdd" id="bRst">Tout r\u00e9initialiser</button></div>';
  document.getElementById('bExp').addEventListener('click',()=>{
    const b=new Blob([JSON.stringify({custom,overrides},null,2)],{type:'application/json'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(b); a.download='dp_hub_data.json'; a.click();
  });
  document.getElementById('fImp').addEventListener('change',e=>{
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader();
    r.onload=ev=>{
      try{
        const d=JSON.parse(ev.target.result);
        if(Array.isArray(d)){ custom=d; overrides={}; }
        else{ custom=Array.isArray(d.custom)?d.custom:[]; overrides=(d.overrides&&typeof d.overrides==='object')?d.overrides:{}; }
        saveC(); saveOv(); render(); toast('Import\u00e9 : '+custom.length+' produit(s)'); renderIO();
      }catch(err){ toast('Fichier invalide : '+err.message,'var(--ac)'); }
    };
    r.readAsText(f);
  });
  document.getElementById('bRst').addEventListener('click',()=>{
    if(!confirm('R\u00e9initialiser toutes les donn\u00e9es ?')) return;
    custom=[]; overrides={}; saveC(); saveOv(); render(); renderIO(); toast('R\u00e9initialis\u00e9');
  });
}
</script>
</body>
</html>
