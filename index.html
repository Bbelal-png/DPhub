<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Projection — Tech Doc Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700;800&family=Barlow:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#07090e;--surface:#0d1117;--s2:#131923;--s3:#1a2232;
  --bd:#1c2840;--bd2:#253450;
  --acc:#e8401a;--acc2:#ff6b3d;
  --blue:#4d8fff;--txt:#b8c8e0;--dim:#4a607a;--bright:#eaf0fc;
  --green:#2ec48a;--yel:#f5b940;--pur:#9b7fe8;--teal:#40d4c8;--org:#ff9640;
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--txt);font-family:'Barlow',sans-serif;font-weight:300;min-height:100vh;overflow-x:hidden}
header{background:linear-gradient(180deg,#0a0f18,var(--surface));border-bottom:1px solid var(--bd);padding:0 2rem;height:62px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
.logo-img{height:30px;object-fit:contain}
.header-right{display:flex;align-items:center;gap:1rem}
.hbadge{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:var(--dim);letter-spacing:.1em;text-transform:uppercase}
.btn-admin{display:flex;align-items:center;gap:.4rem;padding:.45rem .9rem;background:rgba(232,64,26,.1);border:1px solid rgba(232,64,26,.3);border-radius:5px;color:var(--acc2);font-family:'Barlow Condensed',sans-serif;font-size:.78rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .15s}
.btn-admin:hover{background:rgba(232,64,26,.2);border-color:var(--acc)}
.search-zone{background:linear-gradient(180deg,rgba(13,17,23,.97),transparent);padding:1.1rem 2rem .9rem;position:sticky;top:62px;z-index:100;border-bottom:1px solid rgba(28,40,64,.5)}
.search-inner{max-width:1000px;margin:0 auto;display:flex;gap:.75rem;align-items:center;flex-wrap:wrap}
.swrap{flex:1;min-width:220px;display:flex;align-items:center;gap:.6rem;background:var(--s2);border:1px solid var(--bd);border-radius:6px;padding:0 .9rem;transition:border-color .2s}
.swrap:focus-within{border-color:rgba(232,64,26,.5)}
.swrap svg{color:var(--dim);flex-shrink:0}
.swrap input{flex:1;background:none;border:none;outline:none;color:var(--bright);font-family:'Barlow',sans-serif;font-size:.88rem;padding:.7rem 0}
.swrap input::placeholder{color:var(--dim)}
.chips{display:flex;gap:.4rem;flex-wrap:wrap}
.chip{padding:.38rem .8rem;background:var(--s2);border:1px solid var(--bd);border-radius:20px;color:var(--dim);font-family:'Barlow Condensed',sans-serif;font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .15s;white-space:nowrap}
.chip:hover{border-color:var(--bd2);color:var(--txt)}
.chip.active{border-color:var(--acc);color:var(--acc2);background:rgba(232,64,26,.08)}
.layout{display:flex;max-width:1380px;margin:0 auto;padding:1rem 2rem 3rem;gap:1.5rem}
aside{width:225px;flex-shrink:0}
.sbl{font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:.18em;text-transform:uppercase;color:var(--dim);padding:0 .6rem;margin-bottom:.35rem}
.sbsec{margin-bottom:1.4rem}
.sbb{display:flex;align-items:center;gap:.55rem;width:100%;padding:.52rem .7rem;background:none;border:none;border-radius:5px;color:var(--txt);font-family:'Barlow',sans-serif;font-size:.84rem;cursor:pointer;text-align:left;transition:all .12s;position:relative}
.sbb:hover{background:var(--s2);color:var(--bright)}
.sbb.active{background:rgba(232,64,26,.1);color:var(--acc2)}
.sbb.active::before{content:'';position:absolute;left:0;top:20%;height:60%;width:2px;background:var(--acc);border-radius:0 2px 2px 0}
.sdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.scnt{margin-left:auto;font-family:'JetBrains Mono',monospace;font-size:.64rem;color:var(--dim)}
.sdt{display:flex;align-items:center;gap:.5rem;width:100%;padding:.4rem .7rem;background:none;border:none;border-radius:4px;color:var(--dim);font-family:'Barlow',sans-serif;font-size:.8rem;cursor:pointer;text-align:left;transition:all .12s}
.sdt:hover{color:var(--txt);background:var(--s2)}
.sdt.active{color:var(--yel)}
.sdi{font-size:.8rem;width:15px;text-align:center;flex-shrink:0}
main{flex:1;min-width:0}
.rbar{display:flex;align-items:center;justify-content:space-between;padding:.35rem 0 .75rem}
.rtxt{font-family:'Barlow Condensed',sans-serif;font-size:.82rem;color:var(--dim);letter-spacing:.04em}
.rtxt strong{color:var(--bright);font-weight:600}
.card{background:var(--surface);border:1px solid var(--bd);border-radius:8px;margin-bottom:5px;overflow:hidden;transition:border-color .2s}
.card:hover{border-color:var(--bd2)}
.card-head{display:flex;align-items:center;gap:.85rem;padding:.85rem 1.1rem;cursor:pointer;user-select:none}
.cbadge{font-family:'JetBrains Mono',monospace;font-size:.59rem;letter-spacing:.07em;padding:.18rem .48rem;border-radius:3px;text-transform:uppercase;flex-shrink:0}
.cname{flex:1;font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:600;letter-spacing:.04em;color:var(--bright)}
.cpn{font-family:'JetBrains Mono',monospace;font-size:.63rem;color:var(--dim)}
.chev{color:var(--dim);font-size:.68rem;transition:transform .2s;flex-shrink:0}
.card.open .chev{transform:rotate(90deg)}
.dgrid{display:none;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:4px;padding:4px 1.1rem 1.1rem;border-top:1px solid var(--bd)}
.card.open .dgrid{display:grid}
.dtile{display:flex;flex-direction:column;gap:.26rem;padding:.62rem .78rem;background:var(--s2);border:1px solid var(--bd);border-radius:5px;cursor:pointer;transition:all .12s;position:relative;overflow:hidden}
.dtile::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;opacity:0;transition:opacity .15s}
.dtile:hover{border-color:var(--bd2);background:var(--s3)}
.dtile:hover::before{opacity:1}
.dico{font-size:.95rem;line-height:1}
.dlbl{font-family:'Barlow Condensed',sans-serif;font-size:.74rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:var(--bright)}
.dpath{font-family:'JetBrains Mono',monospace;font-size:.55rem;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.dtile[data-t="firmware"]::before{background:var(--green)}
.dtile[data-t="service_manual"]::before{background:var(--acc)}
.dtile[data-t="user_manual"]::before{background:var(--blue)}
.dtile[data-t="comm_protocol"]::before{background:var(--pur)}
.dtile[data-t="drawings"]::before{background:var(--yel)}
.dtile[data-t="parts_list"]::before{background:var(--dim)}
.dtile[data-t="tech_bulletins"]::before{background:var(--org)}
.dtile[data-t="lenses"]::before{background:var(--teal)}
.b-ev{background:rgba(77,143,255,.12);color:#4d8fff}
.b-mv{background:rgba(46,196,138,.12);color:var(--green)}
.b-tl{background:rgba(232,64,26,.12);color:var(--acc2)}
.b-mir{background:rgba(155,127,232,.12);color:var(--pur)}
.b-sat{background:rgba(245,185,64,.12);color:var(--yel)}
.b-cus{background:rgba(64,212,200,.12);color:var(--teal)}
.d-ev{background:#4d8fff}.d-mv{background:var(--green)}.d-tl{background:var(--acc2)}
.d-mir{background:var(--pur)}.d-sat{background:var(--yel)}.d-cus{background:var(--teal)}
.empty{text-align:center;padding:4rem 2rem;color:var(--dim)}
.eico{font-size:2rem;margin-bottom:.75rem;opacity:.3}
.etxt{font-family:'Barlow Condensed',sans-serif;font-size:.95rem;letter-spacing:.05em}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;z-index:999;background:var(--s3);border:1px solid var(--green);color:var(--green);padding:.55rem 1.1rem;border-radius:5px;font-family:'JetBrains Mono',monospace;font-size:.72rem;opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none}
.toast.on{opacity:1;transform:translateY(0)}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:500;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.on{opacity:1;pointer-events:all}
.panel{background:var(--surface);border:1px solid var(--bd2);border-radius:10px;width:min(680px,95vw);max-height:90vh;overflow-y:auto;transform:translateY(20px);transition:transform .2s}
.overlay.on .panel{transform:translateY(0)}
.phead{display:flex;align-items:center;justify-content:space-between;padding:1.2rem 1.5rem .9rem;border-bottom:1px solid var(--bd);position:sticky;top:0;background:var(--surface);z-index:1}
.ptitle{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:1.05rem;letter-spacing:.06em;text-transform:uppercase;color:var(--bright)}
.pclose{background:none;border:1px solid var(--bd);border-radius:4px;color:var(--dim);cursor:pointer;padding:.28rem .5rem;font-size:.88rem;transition:all .15s}
.pclose:hover{border-color:var(--acc);color:var(--acc)}
.pbody{padding:1.2rem 1.5rem}
.ptabs{display:flex;gap:.3rem;margin-bottom:1.2rem}
.ptab{padding:.42rem .95rem;background:none;border:1px solid var(--bd);border-radius:5px;color:var(--dim);font-family:'Barlow Condensed',sans-serif;font-size:.78rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .15s}
.ptab:hover{color:var(--txt);border-color:var(--bd2)}
.ptab.active{border-color:var(--acc);color:var(--acc2);background:rgba(232,64,26,.08)}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:.7rem;margin-bottom:.7rem}
.fg.one{grid-template-columns:1fr}
.fgroup{display:flex;flex-direction:column;gap:.32rem}
.fgroup label{font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:var(--dim)}
.fgroup input,.fgroup select{background:var(--s2);border:1px solid var(--bd);border-radius:5px;color:var(--bright);font-family:'Barlow',sans-serif;font-size:.84rem;padding:.58rem .78rem;outline:none;transition:border-color .15s;width:100%}
.fgroup input:focus,.fgroup select:focus{border-color:rgba(232,64,26,.5)}
option{background:var(--s2)}
.fsec{background:var(--s2);border:1px solid var(--bd);border-radius:6px;padding:.85rem;margin-bottom:.7rem}
.fsect{font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;color:var(--dim);margin-bottom:.6rem;display:flex;align-items:center;gap:.45rem}
.fsect span{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.factions{display:flex;gap:.6rem;justify-content:flex-end;margin-top:.9rem;padding-top:.9rem;border-top:1px solid var(--bd)}
.btn-p{padding:.58rem 1.4rem;background:var(--acc);border:none;border-radius:5px;color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:.83rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .15s}
.btn-p:hover{background:var(--acc2)}
.btn-s{padding:.58rem 1.15rem;background:none;border:1px solid var(--bd2);border-radius:5px;color:var(--txt);font-family:'Barlow Condensed',sans-serif;font-size:.83rem;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;transition:all .15s}
.btn-s:hover{border-color:var(--dim);color:var(--bright)}
.btn-d{padding:.4rem .85rem;background:none;border:1px solid rgba(232,64,26,.3);border-radius:4px;color:var(--acc);font-family:'JetBrains Mono',monospace;font-size:.67rem;cursor:pointer;transition:all .15s}
.btn-d:hover{background:rgba(232,64,26,.1)}
.plist{display:flex;flex-direction:column;gap:4px}
.pitem{display:flex;align-items:center;gap:.7rem;padding:.65rem .88rem;background:var(--s2);border:1px solid var(--bd);border-radius:5px}
.piname{flex:1;font-family:'Barlow Condensed',sans-serif;font-size:.88rem;font-weight:600;color:var(--bright)}
.piinfo{font-family:'JetBrains Mono',monospace;font-size:.61rem;color:var(--dim)}
.piact{display:flex;gap:.35rem;flex-shrink:0}
.btn-e{padding:.28rem .58rem;background:none;border:1px solid var(--bd2);border-radius:4px;color:var(--dim);font-family:'JetBrains Mono',monospace;font-size:.64rem;cursor:pointer;transition:all .15s}
.btn-e:hover{border-color:var(--blue);color:var(--blue)}
.iosec{margin-bottom:1.1rem}
.iotitle{font-family:'Barlow Condensed',sans-serif;font-size:.84rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--bright);margin-bottom:.5rem}
.iodesc{font-size:.81rem;color:var(--dim);margin-bottom:.7rem;line-height:1.5}
.btn-io{padding:.58rem 1.15rem;background:var(--s2);border:1px solid var(--bd2);border-radius:5px;color:var(--txt);font-family:'Barlow Condensed',sans-serif;font-size:.8rem;letter-spacing:.07em;text-transform:uppercase;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:.5rem}
.btn-io:hover{border-color:var(--acc);color:var(--acc2)}
.fiw{position:relative;display:inline-block}
.fiw input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}
@media(max-width:720px){aside{display:none}.layout{padding:.5rem 1rem 2rem}.fg{grid-template-columns:1fr}}
</style>
</head>

const SM = {
  'E-Vision Projectors':   {b:'b-ev',d:'d-ev',s:'E-Vision'},
  'M-Vision Projectors':   {b:'b-mv',d:'d-mv',s:'M-Vision'},

// ── STATE ────────────────────────────────────────────────────────────────────
let custom = [];
let fSeries = 'all', fType = 'all', editIdx = null;
// Global path registry: tile index → path string (avoids any HTML escaping issues)
const PATH_REG = {};
let pathIdx = 0;

function sm(s){ return SM[s] || {b:'b-cus',d:'d-cus',s:s}; }
function loadCustom(){ try{ custom = JSON.parse(localStorage.getItem('dp_c')||'[]'); }catch(e){ custom=[]; } }
function saveCustom(){ localStorage.setItem('dp_c', JSON.stringify(custom)); }
function all(){ return BASE.concat(custom); }
function validPath(p){ return p && p.length > 4 && p !== ')' && p !== '0'; }

function seriesList(){
  const seen = new Set(); const out = [];
  all().forEach(p => { if(!seen.has(p.series)){ seen.add(p.series); out.push(p.series); } });
  return out;
}

// ── TOAST ────────────────────────────────────────────────────────────────────
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('on');
  clearTimeout(t._t); t._t = setTimeout(()=>t.classList.remove('on'), 2200);
}

// ── COPY PATH (uses registry, no inline strings) ─────────────────────────────
function copyByIdx(idx){
  const p = PATH_REG[idx];
  if(!p) return;
  navigator.clipboard.writeText(p).then(()=>toast('✓ Chemin copié'));
}

// ── RENDER ───────────────────────────────────────────────────────────────────
function render(){
  renderSidebar();
  const q = document.getElementById('qinput').value.toLowerCase().trim();
  const prods = all().filter(p => {
    if(fSeries !== 'all' && p.series !== fSeries) return false;
    if(q && !p.name.toLowerCase().includes(q) && !(p.part_number||'').toLowerCase().includes(q)) return false;
    return true;
  });

  document.getElementById('rcount').textContent = prods.length;
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  if(!prods.length){ grid.innerHTML=''; empty.style.display='block'; return; }
  empty.style.display = 'none';

  // Reset path registry each render
  for(const k in PATH_REG) delete PATH_REG[k];
  pathIdx = 0;

  grid.innerHTML = '';
  prods.forEach(p => {
    const m = sm(p.series);
    const card = document.createElement('div');
    card.className = 'card';

    // header
    const head = document.createElement('div');
    head.className = 'card-head';
    head.innerHTML = `<span class="cbadge ${m.b}">${m.s}</span>
      <span class="cname">${p.name}</span>
      ${p.part_number ? `<span class="cpn">PN: ${p.part_number}</span>` : ''}
      <span class="chev">▶</span>`;
    head.addEventListener('click', ()=>card.classList.toggle('open'));

    // doc grid
    const dgrid = document.createElement('div');
    dgrid.className = 'dgrid';

    Object.entries(p.docs||{}).forEach(([k,v]) => {
      if(!validPath(v)) return;
      if(fType !== 'all' && k !== fType) return;
      const dm = DOC_META[k]; if(!dm) return;

      const parts = v.replace(/\\/g,'/').split('/').filter(Boolean);
      const shortPath = parts.slice(-2).join(' › ') || v;

      const tile = document.createElement('div');
      tile.className = 'dtile';
      tile.dataset.t = k;
      tile.title = v;
      tile.innerHTML = `<div class="dico">${dm.i}</div><div class="dlbl">${dm.l}</div><div class="dpath">${shortPath}</div>`;

      const pIdx = pathIdx++;
      PATH_REG[pIdx] = v;
      tile.addEventListener('click', ()=>copyByIdx(pIdx));

      dgrid.appendChild(tile);
    });

    if(fType !== 'all' && dgrid.children.length === 0) return;

    card.appendChild(head);
    card.appendChild(dgrid);
    grid.appendChild(card);
  });
}

function renderSidebar(){
  const prods = all();
  const series = seriesList();

  // Sidebar series
  const sbS = document.getElementById('sbSeries');
  sbS.innerHTML = '';
  const addSbBtn = (label, val, dot, dotCls, cnt) => {
    const b = document.createElement('button');
    b.className = 'sbb' + (fSeries===val?' active':'');
    b.innerHTML = `<span class="sdot" style="background:${dot}"></span>${label}<span class="scnt">${cnt}</span>`;
    b.addEventListener('click', ()=>{ fSeries=val; render(); });
    sbS.appendChild(b);
  };
  addSbBtn('Toutes les gammes','all','var(--dim)','',prods.length);
  series.forEach(s=>{ const m=sm(s); addSbBtn(m.s,s,'',m.d,prods.filter(p=>p.series===s).length); });

  // Fix dots via class
  sbS.querySelectorAll('.sdot').forEach((el,i) => {
    if(i===0) return;
    const s = series[i-1]; const m = sm(s);
    el.classList.add(m.d);
  });

  // Sidebar types
  const sbT = document.getElementById('sbTypes');
  sbT.innerHTML = '';
  const addTypeBtn = (label, val, icon) => {
    const b = document.createElement('button');
    b.className = 'sdt' + (fType===val?' active':'');
    b.innerHTML = `<span class="sdi">${icon}</span>${label}`;
    b.addEventListener('click', ()=>{ fType=val; render(); });
    sbT.appendChild(b);
  };
  addTypeBtn('Tous types','all','◈');
  Object.entries(DOC_META).forEach(([k,v])=>addTypeBtn(v.l,k,v.i));

  // Chips
  const chips = document.getElementById('chips');
  chips.innerHTML = '';
  const addChip = (label,val) => {
    const c = document.createElement('button');
    c.className = 'chip' + (fSeries===val?' active':'');
    c.textContent = label;
    c.addEventListener('click', ()=>{ fSeries=val; render(); });
    chips.appendChild(c);
  };
  addChip('Tous','all');
  series.forEach(s=>{ const m=sm(s); addChip(m.s,s); });
}

// ── ADMIN PANEL ──────────────────────────────────────────────────────────────
let currentTab = 'list';

document.getElementById('btnAdmin').addEventListener('click', ()=>{
  document.getElementById('overlay').classList.add('on');
  showTab('list');
});
document.getElementById('btnClose').addEventListener('click', closeAdmin);
document.getElementById('overlay').addEventListener('click', e=>{ if(e.target===document.getElementById('overlay')) closeAdmin(); });
document.getElementById('panel').addEventListener('click', e=>e.stopPropagation());

document.querySelectorAll('.ptab').forEach(b=>{
  b.addEventListener('click', ()=>{
    document.querySelectorAll('.ptab').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    showTab(b.dataset.tab);
  });
});

function closeAdmin(){
  document.getElementById('overlay').classList.remove('on');
  editIdx = null;
}

function showTab(tab){
  currentTab = tab;
  ['list','add','io'].forEach(t=>{
    document.getElementById('tab'+t.charAt(0).toUpperCase()+t.slice(1)).style.display = t===tab?'':'none';
  });
  if(tab==='list') renderTabList();
  if(tab==='add')  renderTabAdd();
  if(tab==='io')   renderTabIo();
}

  const el = document.getElementById('tabList');
  const prods = all();
  if(!prods.length){ el.innerHTML='<p style="color:var(--dim);font-size:.84rem;padding:.75rem 0">Aucun produit.</p>'; return; }
  el.innerHTML = '';
  const list = document.createElement('div'); list.className='plist';
  const baseLen = BASE.length;
  prods.forEach((p,i)=>{
    const m = sm(p.series);
    const isCustom = i >= baseLen;
    const cidx = isCustom ? i - baseLen : -1;
    const dcnt = Object.values(p.docs||{}).filter(validPath).length;
    const item = document.createElement('div'); item.className='pitem';
    item.innerHTML = `<span class="cbadge ${m.b}" style="flex-shrink:0">${m.s}</span>
      <span class="piname">${p.name}</span>
      <span class="piinfo">${p.part_number||''}${p.part_number&&dcnt?' · ':''}${dcnt} doc${dcnt>1?'s':''}</span>
      <div class="piact"></div>`;
    const acts = item.querySelector('.piact');
    if(isCustom){
      const be = document.createElement('button'); be.className='btn-e'; be.textContent='Éditer';
      be.addEventListener('click', ()=>{ editIdx=cidx; document.querySelectorAll('.ptab').forEach(x=>x.classList.remove('active')); document.querySelector('[data-tab="add"]').classList.add('active'); showTab('add'); });
      const bd = document.createElement('button'); bd.className='btn-d'; bd.textContent='✕';
      bd.addEventListener('click', ()=>deleteProduct(cidx));
      acts.appendChild(be); acts.appendChild(bd);
    } else {
      acts.innerHTML='<span style="font-size:.62rem;color:var(--dim);font-family:JetBrains Mono,monospace">base</span>';
    }
    list.appendChild(item);
  });
  el.appendChild(list);
}

// ── ADD/EDIT TAB ──────────────────────────────────────────────────────────────
function renderTabAdd(){
  const p = editIdx !== null ? custom[editIdx] : null;
  const el = document.getElementById('tabAdd');
  el.innerHTML = '';

  const title = document.createElement('h3');
  title.style.cssText='font-family:Barlow Condensed,sans-serif;font-size:.84rem;letter-spacing:.08em;text-transform:uppercase;color:var(--bright);margin-bottom:1rem';
  title.textContent = p ? 'Modifier le produit' : 'Nouveau produit';
  el.appendChild(title);

  // Basic fields
  const g1 = document.createElement('div'); g1.className='fg';
  g1.innerHTML = `
    <div class="fgroup"><label>Nom du modèle *</label><input id="fn" value="${p?escH(p.name):''}" placeholder="E-Vision Laser 20000 WU"></div>
    <div class="fgroup"><label>Gamme *</label><select id="fs">${
      ['E-Vision Projectors','M-Vision Projectors','Titan Laser Projectors','Mirage Series','Satellite','Personnalisé']
      .map(s=>`<option value="${s}"${p&&p.series===s?' selected':''}>${s}</option>`).join('')
    }</select></div>
    <div class="fgroup"><label>Numéro de pièce</label><input id="fpn" value="${p?escH(p.part_number||''):''}" placeholder="120-XXX"></div>`;
  el.appendChild(g1);

  // Doc paths section
  const sec = document.createElement('div'); sec.className='fsec';
  sec.innerHTML=`<div class="fsect"><span style="background:var(--green)"></span>Chemins réseau des documents</div>`;
  const g2 = document.createElement('div'); g2.className='fg';
  Object.entries(DOC_META).forEach(([k,dm])=>{
    const val = p ? (p.docs[k]||'') : '';
    const dg = document.createElement('div'); dg.className='fgroup';
    dg.innerHTML=`<label>${dm.i} ${dm.l}</label><input id="fd_${k}" value="${escH(val)}" placeholder="Z:\OEM Product Documentation\...">`;
    g2.appendChild(dg);
  });
  sec.appendChild(g2);
  el.appendChild(sec);

  // Actions
  const fa = document.createElement('div'); fa.className='factions';
  const bc = document.createElement('button'); bc.className='btn-s'; bc.textContent='Annuler';
  bc.addEventListener('click',()=>{ editIdx=null; document.querySelectorAll('.ptab').forEach(x=>x.classList.remove('active')); document.querySelector('[data-tab="list"]').classList.add('active'); showTab('list'); });
  const bs = document.createElement('button'); bs.className='btn-p'; bs.textContent = p ? 'Enregistrer' : 'Ajouter le produit';
  bs.addEventListener('click', saveProduct);
  fa.appendChild(bc); fa.appendChild(bs);
  el.appendChild(fa);
}

function escH(s){ return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function saveProduct(){
  const name = document.getElementById('fn').value.trim();
  const series = document.getElementById('fs').value;
  const pn = document.getElementById('fpn').value.trim();
  if(!name){ toast('⚠ Nom du modèle requis'); return; }
  const docs = {};
  Object.keys(DOC_META).forEach(k=>{
    const v = document.getElementById('fd_'+k).value.trim();
    if(v) docs[k]=v;
  });
  const product = {name,series,part_number:pn,docs};
  if(editIdx!==null){ custom[editIdx]=product; toast('✓ Produit mis à jour'); }
  else{ custom.push(product); toast('✓ Produit ajouté'); }
  saveCustom(); editIdx=null; render();
  document.querySelectorAll('.ptab').forEach(x=>x.classList.remove('active'));
  document.querySelector('[data-tab="list"]').classList.add('active');
  showTab('list');
}

function deleteProduct(idx){
  if(!confirm('Supprimer ce produit ?')) return;
  custom.splice(idx,1); saveCustom(); render(); renderTabList(); toast('Produit supprimé');
}

// ── IO TAB ────────────────────────────────────────────────────────────────────
function renderTabIo(){
  const el = document.getElementById('tabIo');
  el.innerHTML = `
    <div class="iosec">
      <div class="iotitle">📤 Exporter</div>
      <div class="iodesc">Exporte tous les produits personnalisés en JSON. Partagez ce fichier avec vos collègues pour synchroniser la base de données.</div>
      <button class="btn-io" id="btnExport">⬇ Télécharger dp_produits.json</button>
    </div>
    <div class="iosec" style="border-top:1px solid var(--bd);padding-top:1.1rem">
      <div class="iotitle">📥 Importer</div>
      <div class="iodesc">Importe un fichier JSON exporté précédemment. Choisissez si vous voulez remplacer ou fusionner les données.</div>
      <div style="display:flex;gap:.5rem;align-items:center">
        <div class="fiw"><button class="btn-io">⬆ Remplacer</button><input type="file" accept=".json" id="fImportReplace"></div>
        <div class="fiw"><button class="btn-io">⊕ Fusionner</button><input type="file" accept=".json" id="fImportMerge"></div>
      </div>
    </div>
    <div class="iosec" style="border-top:1px solid var(--bd);padding-top:1.1rem">
      <div class="iotitle" style="color:var(--acc)">⚠ Réinitialiser</div>
      <div class="iodesc">Supprime tous les produits personnalisés ajoutés manuellement. Les produits de base restent intacts.</div>
      <button class="btn-d" id="btnReset">Effacer les produits personnalisés (${custom.length})</button>
    </div>`;

  document.getElementById('btnExport').addEventListener('click',()=>{
    const blob=new Blob([JSON.stringify(custom,null,2)],{type:'application/json'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='dp_produits.json'; a.click();
  });
  document.getElementById('fImportReplace').addEventListener('change',e=>importJSON(e,false));
  document.getElementById('fImportMerge').addEventListener('change',e=>importJSON(e,true));
  document.getElementById('btnReset').addEventListener('click',()=>{
    if(!confirm('Supprimer tous les produits personnalisés ?')) return;
    custom=[]; saveCustom(); render(); renderTabIo(); toast('Base réinitialisée');
  });
}

function importJSON(e,merge){
  const file=e.target.files[0]; if(!file) return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(!Array.isArray(data)) throw new Error('Format invalide');
      custom = merge ? custom.concat(data) : data;
      saveCustom(); render(); toast(`✓ ${data.length} produit(s) ${merge?'fusionné(s)':'importé(s)'}`);
      renderTabIo();
    } catch(err){ toast('⚠ Fichier invalide : '+err.message); }
  };
  r.readAsText(file);
}

// ── SEARCH ───────────────────────────────────────────────────────────────────
document.getElementById('qinput').addEventListener('input', render);

// ── INIT ─────────────────────────────────────────────────────────────────────
loadCustom();
render();
</script>
</body>
</html>
